# Configuração do nginx que serve a SPA React e faz proxy reverso da API.
#
# Esse arquivo é o ponto único de entrada da aplicação. O browser só
# fala com o nginx; o backend Laravel nunca é exposto diretamente.
#
# Use este arquivo dentro do container do nginx (ex.: copiando-o para
# /etc/nginx/conf.d/default.conf no seu Dockerfile/compose).
#
# Pré-requisitos:
#   - O build do React (dist/) deve estar disponível em /usr/share/nginx/html
#     (ou ajuste o `root` abaixo conforme sua estratégia de build).
#   - O backend Laravel deve estar acessível pelo nome de serviço `backend`
#     na porta 8000 (ajuste se você usou outro nome no docker-compose.yml).

server {
    listen 80;
    server_name _;

    # Arquivos estáticos do React buildado.
    root /usr/share/nginx/html;
    index index.html;

    # Logs para você depurar no container.
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Tamanho máximo do corpo da requisição (uploads etc.).
    client_max_body_size 10M;

    # 1) Proxy para a API.
    #    Tudo que começa com /api/ vai para o Laravel.
    #    O nome `backend` é resolvido pela rede interna do docker-compose.
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;

        # Timeouts mais generosos para chamadas síncronas longas.
        proxy_connect_timeout 30s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Sem cache na API.
        proxy_cache_bypass $http_upgrade;
    }

    # 2) Assets do React com cache longo (arquivos com hash no nome).
    location ~* \.(?:js|css|woff2?|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 3) SPA fallback: qualquer rota desconhecida devolve index.html
    #    para o React Router/Browser cuidar do roteamento client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
